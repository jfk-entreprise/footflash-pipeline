# =============================================================================
# FootFlash — Bloc 2 : Telechargement automatique des clips officiels FIFA
# =============================================================================
# Declencheur : push d'un nouveau JSON de match (B1) dans 01_Donnees/matchs/
#   (filtre *_data.json : n'inclut pas les _moments.json du Bloc 3).
# Le job : checkout (LFS) -> yt-dlp+ffmpeg -> telechargement clips FIFA certifies
#   -> commit/push resilient (clips via Git LFS) -> declenche le Bloc 3.
# SECURITE : secrets via GitHub Secrets uniquement. Push avec GITHUB_TOKEN.
# =============================================================================
name: Bloc2 - Telechargement clips FIFA

on:
  push:
    paths:
      - "**/*matchs*/*_data.json"   # SEULEMENT les JSON de match B1 (pas _moments.json)
  workflow_dispatch:

concurrency:
  group: footflash-bloc2
  cancel-in-progress: false

permissions:
  contents: write                   # committer les clips (LFS) + log + etat
  actions: write                    # declencher le Bloc 3 via gh workflow run

jobs:
  telecharger-clips:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout du repo (avec Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation de yt-dlp et ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          REQ="$(find . -name requirements-bloc2.txt | head -n 1)"
          python -m pip install -U -r "$REQ"   # -U : yt-dlp doit rester recent (YouTube)
          yt-dlp --version
          ffmpeg -version | head -n 1

      - name: Preparation des cookies YouTube (si secret fourni)
        id: cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            # Cookies ecrits HORS du repo ($RUNNER_TEMP) : jamais vus par git add.
            echo "$YOUTUBE_COOKIES" | base64 -d > "$RUNNER_TEMP/cookies.txt"
            # Sortie explicite (consommee par l'etape de telechargement) + env (redondance).
            echo "file=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_OUTPUT"
            echo "YOUTUBE_COOKIES_FILE=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_ENV"
            echo "Cookies YouTube prepares ($(wc -l < "$RUNNER_TEMP/cookies.txt") lignes)."
          else
            echo "file=" >> "$GITHUB_OUTPUT"
            echo "Pas de secret YOUTUBE_COOKIES — yt-dlp sans cookies (peut echouer sur le bot-check)."
          fi

      - name: Telechargement des clips officiels FIFA
        env:
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_COOKIES_FILE: ${{ steps.cookies.outputs.file }}
        run: |
          SCRIPT="$(find . -name telecharger_clips.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::telecharger_clips.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          python "$SCRIPT"

      - name: Commit et push des resultats (clips LFS + log + etat)
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          # Nouveau(x) clip(s) telecharge(s) ? (avant le git add)
          NOUVEAU="false"
          if git status --porcelain | grep -qE '_brut\.mp4'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc2: clips FIFA telecharges + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 3 (si nouveau clip)
        if: steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouveau(x) clip(s) — declenchement du Bloc 3."
          gh workflow run "bloc3-analyse-moments.yml" --ref "${{ github.ref_name }}"
