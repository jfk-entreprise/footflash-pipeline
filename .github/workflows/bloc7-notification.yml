# =============================================================================
# FootFlash — Bloc 7 (1/2) : Notification de validation
# Chaine : declenche par le Bloc 6. NE declenche PAS le Bloc 8 (validation humaine).
# La reponse OUI/NON est traitee par le watcher (bloc7-watch-validation.yml, cron)
# qui declenche le Bloc 8 via gh workflow run.
# =============================================================================
name: Bloc7 - Notification validation

on:
  workflow_dispatch:

concurrency:
  group: footflash-bloc7-notif
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notifier:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Envoi de la notification de validation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SCRIPT="$(find . -name notifier_validation.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::notifier_validation.py introuvable"; exit 1
          fi
          python "$SCRIPT"

      - name: Commit et push (etat de validation + log)
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc7: notification de validation envoyee [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi
