# =============================================================================
# FootFlash — Bloc 4 : Generation des scripts de voix off (buts + analyse)
# Chaine : declenche par le Bloc 3. Declenche ensuite le Bloc 5.
# =============================================================================
name: Bloc4 - Scripts voix off

on:
  workflow_dispatch:

concurrency:
  group: footflash-bloc4
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  generer-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generation des scripts (buts + analyse)
        run: |
          BUTS="$(find . -name generer_script_buts.py -path '*Scripts*' | head -n 1)"
          ANALYSE="$(find . -name generer_script_analyse.py -path '*Scripts*' | head -n 1)"
          if [ -z "$BUTS" ] || [ -z "$ANALYSE" ]; then
            echo "::error::generateur(s) Bloc4 introuvable(s)"; exit 1
          fi
          python "$BUTS"
          python "$ANALYSE"

      - name: Commit et push (.txt + log)
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          NOUVEAU="false"
          if git status --porcelain | grep -qE '_script-.*\.txt'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc4: scripts voix off (buts + analyse) + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 5 (si nouveaux scripts)
        if: steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouveau(x) script(s) — declenchement du Bloc 5."
          gh workflow run "bloc5-voix.yml" --ref "${{ github.ref_name }}"
