# =============================================================================
# FootFlash — Bloc 3 : Analyse des moments cles
# Chaine : declenche par le Bloc 2 (gh workflow run). Declenche ensuite le Bloc 4.
# =============================================================================
name: Bloc3 - Analyse moments cles

on:
  workflow_dispatch:

concurrency:
  group: footflash-bloc3
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  analyser-moments:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Analyse des moments cles
        run: |
          SCRIPT="$(find . -name analyse_moments.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::analyse_moments.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          python "$SCRIPT"

      - name: Commit et push (_moments.json + log)
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          NOUVEAU="false"
          if git status --porcelain | grep -qE '_moments\.json'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc3: analyse moments cles + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 4 (si nouvelle analyse)
        if: steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouvelle(s) analyse(s) — declenchement du Bloc 4."
          gh workflow run "bloc4-scripts.yml" --ref "${{ github.ref_name }}"
