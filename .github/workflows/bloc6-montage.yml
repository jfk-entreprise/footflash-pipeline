# =============================================================================
# FootFlash — Bloc 6 : Montage video final (FFmpeg)
# Chaine : declenche par le Bloc 5. Declenche ensuite le Bloc 7.
# =============================================================================
name: Bloc6 - Montage video

on:
  workflow_dispatch:

concurrency:
  group: footflash-bloc6
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  monter-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout du repo (avec Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation de ffmpeg + polices
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -n 1

      - name: Montage des videos
        run: |
          SCRIPT="$(find . -name generer_montage.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::generer_montage.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          python "$SCRIPT"

      - name: Commit et push (MP4 LFS + timelines .ass + log + etat)
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          NOUVEAU="false"
          if git status --porcelain | grep -qE '_video-.*\.mp4'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc6: videos montees (buts + analyse) + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 7 (si nouvelle video)
        if: steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouvelle(s) video(s) — declenchement du Bloc 7 (notification)."
          gh workflow run "bloc7-notification.yml" --ref "${{ github.ref_name }}"
