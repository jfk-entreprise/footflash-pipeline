# =============================================================================
# FootFlash — Bloc 5 : Generation de la voix off (Kokoro TTS)
# Chaine : declenche par le Bloc 4. Declenche ensuite le Bloc 6.
# =============================================================================
name: Bloc5 - Voix off

on:
  workflow_dispatch:

concurrency:
  group: footflash-bloc5
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  generer-voix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout du repo (avec Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances (espeak-ng, ffmpeg, kokoro, soundfile, misaki[fr])
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y espeak-ng ffmpeg
          python -m pip install --upgrade pip
          REQ="$(find . -name requirements-bloc5.txt | head -n 1)"
          python -m pip install -r "$REQ"
          ffmpeg -version | head -n 1

      - name: Generation de la voix off
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SCRIPT="$(find . -name generer_voix.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::generer_voix.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          python "$SCRIPT"

      - name: Commit et push (MP3 LFS + log + etat)
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          NOUVEAU="false"
          if git status --porcelain | grep -qE '_voix-.*\.mp3'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc5: voix off (buts + analyse) + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 6 (si nouvelle voix)
        if: steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouvelle(s) voix off — declenchement du Bloc 6."
          gh workflow run "bloc6-montage.yml" --ref "${{ github.ref_name }}"
