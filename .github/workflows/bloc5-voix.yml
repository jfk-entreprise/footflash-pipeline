# =============================================================================
# FootFlash — Bloc 5 : Generation de la voix off (Kokoro TTS)
# =============================================================================
# Chainage : Bloc1 -> Bloc2 -> Bloc3 -> Bloc4 -> [Bloc5].
# Declencheur : fin (succes) du Bloc 4 (les scripts .txt sont alors disponibles)
#   + workflow_dispatch pour relance manuelle.
#
# Le job :
#   1. Recupere le repo (Git LFS pour les .mp3/.mp4).
#   2. Installe les deps NON-stdlib : espeak-ng + ffmpeg (systeme),
#      kokoro + soundfile (pip).
#   3. Lance 03_Scripts/generer_voix.py (voix FR ff_siwis, repli EN ;
#      anti-doublon .voiced.json integre).
#   4. Commit/push les MP3 (LFS) + le log + l'etat.
#
# NB : premier run plus long (telechargement du modele Kokoro + torch).
# =============================================================================

name: Bloc5 - Voix off

on:
  workflow_run:
    workflows: ["Bloc4 - Scripts voix off"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: footflash-bloc5
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generer-voix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout du repo (avec Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances (espeak-ng, ffmpeg, kokoro, soundfile)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y espeak-ng ffmpeg
          python -m pip install --upgrade pip
          REQ="$(find . -name requirements-bloc5.txt | head -n 1)"
          python -m pip install -r "$REQ"
          ffmpeg -version | head -n 1

      - name: Generation de la voix off
        run: |
          SCRIPT="$(find . -name generer_voix.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::generer_voix.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          python "$SCRIPT"

      - name: Commit et push (MP3 LFS + log + etat)
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc5: voix off (buts + analyse) + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" &&