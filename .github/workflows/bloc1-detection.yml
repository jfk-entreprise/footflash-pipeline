# =============================================================================
# FootFlash — Bloc 1 : Detection des matchs termines (Coupe du Monde 2026)
# Source : Football-Data.org (v4). Secret : FOOTBALL_DATA_API_KEY.
# =============================================================================
name: Bloc1 - Detection matchs CdM 2026

on:
  schedule:
    - cron: "*/20 * * * *"       # toutes les 20 min, 24h/24 (matchs nocturnes Amerique du Nord)
  workflow_dispatch:
    inputs:
      verify:
        description: "Self-test couverture Football-Data (matchs a venir) au lieu de la detection"
        type: boolean
        default: false

concurrency:
  group: footflash-bloc1
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  detecter-matchs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Garde-fou — fenetre du tournoi (11/06 -> 19/07 2026)
        id: fenetre
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          START="2026-06-11"
          END="2026-07-19"
          if [[ "${{ github.event.inputs.verify }}" == "true" ]]; then
            echo "Mode self-test (verify) — fenetre ignoree."
            echo "actif=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TODAY" < "$START" || "$TODAY" > "$END" ]]; then
            echo "Hors fenetre tournoi ($TODAY) — arret propre."
            echo "actif=false" >> "$GITHUB_OUTPUT"
          else
            echo "Dans la fenetre tournoi ($TODAY)."
            echo "actif=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout du repo
        if: steps.fenetre.outputs.actif == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Python
        if: steps.fenetre.outputs.actif == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detection des matchs termines
        if: steps.fenetre.outputs.actif == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SCRIPT="$(find . -name surveillance_matchs.py -path '*Scripts*' | head -n 1)"
          if [ -z "$SCRIPT" ]; then
            echo "::error::surveillance_matchs.py introuvable"; exit 1
          fi
          echo "Script : $SCRIPT"
          if [[ "${{ github.event.inputs.verify }}" == "true" ]]; then
            python "$SCRIPT" --verify
          else
            python "$SCRIPT"
          fi

      - name: Detection de nouveaux matchs + commit/push
        if: steps.fenetre.outputs.actif == 'true' && github.event.inputs.verify != 'true'
        id: push
        run: |
          git config user.name  "footflash-bot"
          git config user.email "footflash-bot@users.noreply.github.com"
          NOUVEAU="false"
          if git status --porcelain | grep -E '_data\.json' | grep -qi 'matchs'; then
            NOUVEAU="true"
          fi
          echo "nouveau=$NOUVEAU" >> "$GITHUB_OUTPUT"
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "Bloc1: detection matchs CdM 2026 + log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && break || sleep 5
            done
          fi

      - name: Declenchement du Bloc 2 (si nouveau match)
        if: steps.fenetre.outputs.actif == 'true' && steps.push.outputs.nouveau == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Nouveau(x) match(s) detecte(s) — declenchement du Bloc 2."
          gh workflow run "bloc2-telechargement-clips.yml" --ref "${{ github.ref_name }}"
